name: Daily News Delivery Pipeline

on:
  schedule:
    # 毎日 UTC 05:00 (タイ・ラオス時間 12:00 PM / 日本時間 14:00)
    - cron: '0 5 * * *'
  workflow_dispatch: # 手動実行可能

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/checkout@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install facebook-scraper feedparser google-generativeai requests

    - name: Run news generation script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python scripts/daily_delivery.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add src/data/news.json
        # 差分がある場合のみコミット
        git diff-index --quiet HEAD || git commit -m "Auto-update: Daily news sync [skip ci]"
        git push origin main
